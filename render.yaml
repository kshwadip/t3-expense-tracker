services:
  - type: web
    name: expense-tracker-worker
    runtime: node
    # --include=dev ensures tsx (a devDependency) is available at runtime
    buildCommand: npm install --include=dev
    startCommand: npx tsx src/server/queue/worker.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard — never commit secrets
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL      # same Upstash URL as on Vercel
        sync: false